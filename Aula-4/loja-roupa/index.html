<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja</title>
</head>
<body>
    
    <h1>Loja de roupas: Galeria</h1>

    <button onclick="mostrardetalhes('Camisetas','R$49,99')">Camisetas</button>

    <button onclick="mostrardetalhes('Calça','R$89,90')">Calça</button>

    <!-- Modal -->
    <div id="modal" 
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); padding:50px;">
        
        <div style="background:white; padding:30px; max-width:400px; margin:auto; border-radius:10px;">
            <h3 id="modal-titulo"></h3>
            <p id="modal-preco"></p>
            <button onclick="fecharModal()">Fechar</button>
        </div>

    </div>

    <div id="resultado" class="resultado"></div>

    <script>
        function mostrardetalhes(nome, preco){
            document.getElementById("modal-titulo").innerText = nome;
            document.getElementById("modal-preco").innerText = preco;
            document.getElementById("modal").style.display = "block";
        }

        function fecharModal(){
            document.getElementById("modal").style.display = "none";
        }
    </script>

</body>
</html>
